
services:
  db:
    image: postgres:16-alpine
    container_name: geraai_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: geraai
      POSTGRES_USER: geraai
      POSTGRES_PASSWORD: geraai
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geraai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: geraai_backend
    restart: unless-stopped
    entrypoint: ["/app/entrypoint.sh"]
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: geraai_frontend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  pgdata:
